name: telegram-osint-bot

on:
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: install dependencies
        run: pip install -r requirements.txt

      - name: run bot
        env:
          TOKEN: ${{ secrets.TOKEN }}
        run: python main.py
